name: Build and Test
run-name: ${{github.actor}} is running python tests
on: [push]

jobs:
  Build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Install pybind11
        run: |
          python -m pip install --upgrade pip
          pip install pybind11
          
      - name: Compile C++ code
        run: bash build.sh

  Test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Install pybind11
        run: |
          python -m pip install --upgrade pip
          pip install pybind11

      - name: Install pytest
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          
      - name: Compile C++ code
        run: bash build.sh

      - name: Run Python tests
        run: bash test.sh
